<svg width="100%" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Junghyun space header">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#03040c"/>
      <stop offset="70%" stop-color="#070d22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="planet" cx="32%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#7fb3ff"/>
      <stop offset="55%" stop-color="#2b5fd9"/>
      <stop offset="100%" stop-color="#101d4d"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .star{fill:#fff}
    .tw1{animation:tw 2.4s ease-in-out infinite}
    .tw2{animation:tw 3.1s ease-in-out .6s infinite}
    .tw3{animation:tw 2.8s ease-in-out 1.2s infinite}
    @keyframes tw{0%,100%{opacity:.25}50%{opacity:1}}
    .orbit{transform-origin:400px 108px;animation:spin 8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .shoot{animation:shoot 7s ease-in 2s infinite;opacity:0}
    @keyframes shoot{0%{transform:translate(0,0);opacity:0}3%{opacity:1}12%{transform:translate(900px,140px);opacity:0}100%{transform:translate(900px,140px);opacity:0}}
    .title{font:800 40px -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;fill:#eaf0ff;letter-spacing:1px}
    .sub{font:500 14px 'SFMono-Regular',Consolas,Menlo,monospace;fill:#8fa3d9;letter-spacing:2px}
  </style>

  <rect width="800" height="280" fill="url(#sky)"/>

  <!-- 별 -->
  <g>
    <circle class="star tw1" cx="60" cy="40" r="1.4"/>
    <circle class="star tw2" cx="130" cy="120" r="1"/>
    <circle class="star tw3" cx="200" cy="60" r="1.6"/>
    <circle class="star tw1" cx="270" cy="170" r="1"/>
    <circle class="star tw2" cx="330" cy="35" r="1.2"/>
    <circle class="star tw3" cx="470" cy="50" r="1.4"/>
    <circle class="star tw1" cx="540" cy="150" r="1"/>
    <circle class="star tw2" cx="610" cy="80" r="1.6"/>
    <circle class="star tw3" cx="680" cy="180" r="1"/>
    <circle class="star tw1" cx="740" cy="45" r="1.3"/>
    <circle class="star tw2" cx="90" cy="210" r="1.1" fill="#ffd9a0"/>
    <circle class="star tw3" cx="720" cy="120" r="1.2" fill="#ffd9a0"/>
    <circle class="star tw1" cx="380" cy="230" r="1" fill="#9fb8ff"/>
    <circle class="star tw2" cx="160" cy="250" r="1.1" fill="#9fb8ff"/>
    <circle class="star tw3" cx="640" cy="240" r="1.2"/>
  </g>

  <!-- 별똥별 -->
  <g class="shoot">
    <line x1="-80" y1="30" x2="-160" y2="18" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity=".9"/>
  </g>

  <!-- 행성 + 궤도 -->
  <circle cx="400" cy="108" r="34" fill="url(#planet)" filter="url(#glow)"/>
  <circle cx="400" cy="108" r="56" fill="none" stroke="#8caaff" stroke-opacity=".35" stroke-dasharray="4 6"/>
  <g class="orbit">
    <circle cx="400" cy="52" r="5" fill="#ffd9a0" filter="url(#glow)"/>
  </g>

  <!-- 타이틀 -->
  <text class="title" x="400" y="212" text-anchor="middle">JEON</text>
  <text class="sub" x="400" y="242" text-anchor="middle">AI · DATA · COMPUTER VISION</text>
</svg>
